<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Orbit Sync</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <!-- ── Header ─────────────────────────────────────────────── -->
  <header class="header">
    <div class="logo-row">
      <svg class="orbit-icon" viewBox="0 0 32 32" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="16" cy="16" r="3" fill="#00E5FF"/>
        <ellipse cx="16" cy="16" rx="13" ry="6" stroke="#00E5FF" stroke-width="1.5" fill="none" opacity="0.6"/>
        <ellipse cx="16" cy="16" rx="13" ry="6" stroke="#00E5FF" stroke-width="1.5" fill="none" opacity="0.3" transform="rotate(60 16 16)"/>
        <ellipse cx="16" cy="16" rx="13" ry="6" stroke="#00E5FF" stroke-width="1.5" fill="none" opacity="0.3" transform="rotate(120 16 16)"/>
        <circle cx="28.5" cy="13" r="2" fill="#00E5FF"/>
      </svg>
      <span class="logo-text">ORBIT</span>
    </div>
    <p class="tagline">Career Intelligence Agent</p>
  </header>

  <!-- ── Status ─────────────────────────────────────────────── -->
  <section class="card" id="status-card">
    <div class="section-label">AGENT STATUS</div>
    <div class="status-row">
      <span class="dot" id="status-dot"></span>
      <span class="status-text" id="status-text">Checking…</span>
    </div>
  </section>

  <!-- ── Current Page ───────────────────────────────────────── -->
  <section class="card" id="page-card">
    <div class="section-label">CURRENT PAGE</div>
    <div class="page-row">
      <span class="platform-badge" id="platform-badge">—</span>
      <span class="sync-state" id="sync-state">—</span>
    </div>
  </section>

  <!-- ── Stats ──────────────────────────────────────────────── -->
  <section class="card stats-card">
    <div class="section-label">ACTIVITY</div>
    <div class="stats-grid">
      <div class="stat">
        <div class="stat-value" id="last-synced">—</div>
        <div class="stat-label">Last Sync</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="sync-count">0</div>
        <div class="stat-label">Sessions Synced</div>
      </div>
    </div>
  </section>

  <!-- ── Settings ───────────────────────────────────────────── -->
  <section class="card">
    <div class="section-label">SETTINGS</div>

    <div class="field-group">
      <label class="field-label" for="backend-url">Backend URL</label>
      <div class="input-row">
        <input
          id="backend-url"
          type="text"
          class="text-input"
          placeholder="https://your-railway-url.up.railway.app"
        />
        <button id="save-url" class="save-btn">Save</button>
      </div>
      <span class="save-feedback" id="save-feedback"></span>
    </div>

    <div class="toggle-group">
      <label class="toggle-row">
        <span class="toggle-label">Auto-sync</span>
        <div class="toggle-wrap">
          <input type="checkbox" id="auto-sync" class="toggle-input" />
          <span class="toggle-slider"></span>
        </div>
      </label>

      <label class="toggle-row">
        <span class="toggle-label">Notifications</span>
        <div class="toggle-wrap">
          <input type="checkbox" id="show-notifs" class="toggle-input" />
          <span class="toggle-slider"></span>
        </div>
      </label>
    </div>
  </section>

  <!-- ── Manual Sync ────────────────────────────────────────── -->
  <section class="manual-section">
    <button id="sync-now" class="sync-btn">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
        <path d="M12 7A5 5 0 1 1 7 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M7 0l2 2-2 2" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      Sync Current Page Now
    </button>
  </section>

  <!-- ── Footer ─────────────────────────────────────────────── -->
  <footer class="footer">
    Made for Orbit — Your Career Intelligence Agent
  </footer>

  <script src="popup.js"></script>
</body>
</html>
